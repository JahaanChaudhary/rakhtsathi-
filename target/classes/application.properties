server.port=${PORT:8080}

# ── PostgreSQL ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/blood_donor_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Thymeleaf ──────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Mail (update with your Gmail + App Password) ───────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremail@gmail.com
spring.mail.password=your_16_char_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logging ────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.app.blooddonor=INFO
logging.level.com.app.blooddonor.service=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{30} - %msg%n
