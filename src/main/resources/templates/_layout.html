<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title} + ' — RakhtSathi'">RakhtSathi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand" href="/">
      <span style="font-size:1.4rem;">🩸</span>
      <span class="brand-text">RakhtSathi</span>
    </a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/search">Find Donor</a></li>
        <li class="nav-item"><a class="nav-link" href="/compatibility">Compatibility</a></li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" href="/donor/dashboard">Dashboard</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
          <a class="nav-link" href="/admin/dashboard">Admin</a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="nav-link" href="/login">Login</a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a class="btn btn-danger btn-sm px-3" href="/register">Register as Donor</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="btn btn-outline-danger btn-sm px-3" href="/logout">Logout</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<footer th:fragment="footer">
  <div class="container text-center py-4"
       style="background:#1a1a2e;color:rgba(255,255,255,0.6);">
    <div style="font-family:'Fraunces',serif;font-size:1.3rem;color:#fff;margin-bottom:8px;">
      🩸 RakhtSathi
    </div>
    <p class="small mb-2">Connecting donors with those in need.</p>
    <div class="d-flex justify-content-center gap-4 small">
      <a href="/"             class="text-decoration-none" style="color:rgba(255,255,255,0.6);">Home</a>
      <a href="/search"       class="text-decoration-none" style="color:rgba(255,255,255,0.6);">Find Donor</a>
      <a href="/compatibility" class="text-decoration-none" style="color:rgba(255,255,255,0.6);">Compatibility</a>
      <a href="/register"     class="text-decoration-none" style="color:rgba(255,255,255,0.6);">Become a Donor</a>
    </div>
    <div class="mt-2" style="font-size:.75rem;color:rgba(255,255,255,0.3);">
      © 2024 RakhtSathi. Made with ❤️ by Jahaan Chaudhary
    </div>
  </div>
</footer>

<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
